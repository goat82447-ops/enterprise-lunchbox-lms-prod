name: Build RouteX APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/lunchbox-app/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/lunchbox-app
        run: npm ci

      - name: Build Angular app (production)
        working-directory: Frontend/lunchbox-app
        run: npm run build -- --configuration production

      - name: Sync Capacitor
        working-directory: Frontend/lunchbox-app
        run: npx cap sync android

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        working-directory: Frontend/lunchbox-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: Frontend/lunchbox-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RouteX-debug-apk
          path: Frontend/lunchbox-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ APK built successfully!"
          ls -lh Frontend/lunchbox-app/android/app/build/outputs/apk/debug/
