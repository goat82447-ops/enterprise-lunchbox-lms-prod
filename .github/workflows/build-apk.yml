name: Build RouteX APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/lunchbox-app/package-lock.json

      - name: Install deps
        working-directory: Frontend/lunchbox-app
        run: npm ci

      - name: Build Angular
        working-directory: Frontend/lunchbox-app
        run: npm run build -- --configuration production

      - name: Install Capacitor
        working-directory: Frontend/lunchbox-app
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write capacitor config
        working-directory: Frontend/lunchbox-app
        run: |
          echo '{"appId":"com.routex.app","appName":"RouteX","webDir":"dist/lunchbox-app/browser","server":{"url":"https://enterprise-lunchbox-lms-prod.vercel.app"}}' > capacitor.config.json

      - name: Add and sync Android
        working-directory: Frontend/lunchbox-app
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Fix Kotlin duplicate class conflict
        working-directory: Frontend/lunchbox-app/android
        run: |
          cat >> build.gradle << 'GRADLE'
          subprojects {
            configurations.all {
              resolutionStrategy {
                force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
                force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0'
                force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
              }
            }
          }
          GRADLE

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: Frontend/lunchbox-app/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RouteX-debug-apk
          path: Frontend/lunchbox-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
