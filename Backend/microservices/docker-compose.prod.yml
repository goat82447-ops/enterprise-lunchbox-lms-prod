version: '3.8'

services:
  api-gateway:
    image: ekartregistry/api-gateway:latest
    container_name: ekart-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SERVICE_URL=http://auth-service:3003
      - MENU_SERVICE_URL=http://menu-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
      - PARCEL_SERVICE_URL=http://parcel-service:5000
      - LOG_LEVEL=warn
    depends_on:
      - auth-service
      - menu-service
      - order-service
    networks:
      - ekart-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  auth-service:
    image: ekartregistry/auth-service:latest
    container_name: ekart-auth-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGODB_URI=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/lunchbox_db?retryWrites=true&w=majority
      - ENABLE_INMEMORY_FALLBACK=0
      - OTP_DEBUG_MODE=0
      - REQUIRE_CUSTOMER_REGISTRATION_OTP=1
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=noreply@ekartapp.com
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - LOG_LEVEL=warn
    networks:
      - ekart-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  menu-service:
    image: ekartregistry/menu-service:latest
    container_name: ekart-menu-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/lunchbox_menu?retryWrites=true&w=majority
      - ENABLE_INMEMORY_FALLBACK=0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - LOG_LEVEL=warn
    networks:
      - ekart-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    image: ekartregistry/order-service:latest
    container_name: ekart-order-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/lunchbox_orders?retryWrites=true&w=majority
      - ENABLE_INMEMORY_FALLBACK=0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - LOG_LEVEL=warn
    networks:
      - ekart-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ekart-network:
    driver: bridge
